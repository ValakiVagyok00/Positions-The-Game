<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Intimate</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=Cinzel:wght@400;600&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg-start: #1a0a1e;
      --bg-mid:   #2b0d2f;
      --bg-end:   #0d0818;
      --purple-outline: rgba(160, 80, 220, 0.85);
      --btn-selected-bg: rgba(120, 40, 160, 0.18);

      --color-positions: #c0392b;
      --color-foreplay:  #e75480;
      --color-guided:    #5dade2;
      --color-solo:      #f4d03f;

      --active-color: var(--color-positions);
    }

    html, body {
      width: 100%; height: 100%;
      font-family: 'Cormorant Garamond', serif;
      overflow: hidden;
    }

    body {
      background: radial-gradient(ellipse at 30% 20%, #3b0d4a 0%, #1a0520 40%, #0a0612 70%, #150820 100%);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      position: relative;
    }

    /* Subtle atmospheric overlay */
    body::before {
      content: '';
      position: fixed; inset: 0;
      background:
        radial-gradient(ellipse at 70% 80%, rgba(100, 10, 80, 0.35) 0%, transparent 55%),
        radial-gradient(ellipse at 20% 60%, rgba(60, 0, 90, 0.3) 0%, transparent 50%);
      pointer-events: none;
      z-index: 0;
    }

    /* Grain texture */
    body::after {
      content: '';
      position: fixed; inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.035'/%3E%3C/svg%3E");
      background-size: 180px;
      opacity: 0.4;
      pointer-events: none;
      z-index: 0;
    }

    .wrapper {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 60px;
      width: 100%;
      padding: 20px;
      margin-top: -120px;
    }

    /* ── NAV ── */
    nav {
      display: flex;
      gap: 12px;
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.07);
      border-radius: 60px;
      padding: 8px 12px;
      backdrop-filter: blur(12px);
    }

    .nav-btn {
      position: relative;
      font-family: 'Cinzel', serif;
      font-size: 0.72rem;
      font-weight: 400;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: rgba(230, 200, 240, 0.7);
      background: transparent;
      border: 2px solid transparent;
      border-radius: 40px;
      padding: 10px 22px;
      cursor: pointer;
      transition: all 0.3s ease;
      white-space: nowrap;
    }

    .nav-btn:hover {
      color: rgba(230, 200, 240, 1);
      background: rgba(140, 60, 180, 0.1);
    }

    .nav-btn.active {
      color: #fff;
      background: var(--btn-selected-bg);
      border-color: var(--purple-outline);
      box-shadow: 0 0 18px rgba(160, 80, 220, 0.25), inset 0 0 12px rgba(160, 80, 220, 0.08);
    }

    /* ── SECTION LABEL ── */
    .label-row {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      margin-top: -30px;
      min-height: 1.4em;
      position: relative;
    }

    .section-label {
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
      font-size: 1.05rem;
      font-weight: 300;
      letter-spacing: 0.25em;
      color: rgba(226, 175, 253, 0.8);
      text-transform: uppercase;
    }

    .section-label.flash {
      animation: labelFlash 0.4s ease;
    }

    @keyframes labelFlash {
      0%   { opacity: 0; transform: translateY(6px); }
      100% { opacity: 1; transform: translateY(0); }
    }

    .info-btn {
      width: 22px; height: 22px;
      border-radius: 50%;
      border: 1px solid rgba(180,180,180,0.3);
      background: transparent;
      color: #bbb;
      font-size: 0.75rem;
      font-family: 'Cinzel', serif;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: color 0.2s, border-color 0.2s, opacity 0.2s;
      opacity: 0;
      pointer-events: none;
      flex-shrink: 0;
    }

    .info-btn.visible {
      opacity: 1;
      pointer-events: all;
    }

    .info-btn:hover {
      color: #ddd;
      border-color: rgba(220,180,240,0.5);
    }

    .info-popup {
      position: absolute;
      left: 50%;
      top: calc(100% + 10px);
      transform: translateX(-50%);
      background: rgba(120, 40, 160, 0.15);
      border: 1px solid rgba(160, 80, 220, 0.25);
      backdrop-filter: blur(10px);
      border-radius: 12px;
      padding: 10px 16px;
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
      font-size: 0.9rem;
      color: rgba(230, 200, 245, 0.8);
      white-space: nowrap;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.25s ease, transform 0.25s ease;
      transform: translateX(-50%) translateY(4px);
      z-index: 10;
    }

    .info-popup.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    /* ── PRESS BUTTON ── */
    .press-area {
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* Glow ring */
    .press-area::before {
      content: '';
      position: absolute;
      width: 260px; height: 260px;
      border-radius: 50%;
      background: radial-gradient(circle, var(--active-color) 0%, transparent 70%);
      opacity: 0.12;
      filter: blur(30px);
      transition: background 0.5s ease, opacity 0.3s;
      pointer-events: none;
    }

    .press-btn {
      width: 200px; height: 200px;
      border-radius: 50%;
      border: none;
      cursor: pointer;
      font-family: 'Cinzel', serif;
      font-size: 1.3rem;
      font-weight: 600;
      letter-spacing: 0.2em;
      color: #fff;
      position: relative;
      overflow: hidden;
      transition: transform 0.15s ease, box-shadow 0.4s ease;
      background: radial-gradient(circle at 38% 35%, color-mix(in srgb, var(--active-color) 80%, white 20%), var(--active-color) 65%, color-mix(in srgb, var(--active-color) 70%, black 30%));
      box-shadow:
        0 0 40px color-mix(in srgb, var(--active-color) 50%, transparent),
        0 8px 32px rgba(0,0,0,0.5),
        inset 0 2px 8px rgba(255,255,255,0.2),
        inset 0 -4px 12px rgba(0,0,0,0.25);
    }

    .press-btn::after {
      content: '';
      position: absolute;
      top: 12%; left: 20%;
      width: 40%; height: 20%;
      background: rgba(255,255,255,0.18);
      border-radius: 50%;
      filter: blur(6px);
      pointer-events: none;
    }

    .press-btn:hover {
      transform: scale(1.05);
    }

    .press-btn:active {
      transform: scale(0.96);
    }

    .press-btn.pop {
      animation: btnPop 0.25s ease;
    }

    @keyframes btnPop {
      0%   { transform: scale(1); }
      40%  { transform: scale(0.92); }
      70%  { transform: scale(1.06); }
      100% { transform: scale(1); }
    }

    /* ── CONFETTI CANVAS ── */
    #confetti-canvas {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 100;
    }

    /* ── FLOATING HEARTS ── 
    .heart-particle {
      position: fixed;
      font-size: 1.8rem;
      pointer-events: none;
      z-index: 101;
      animation: floatHeart 1.8s ease-out forwards;
      user-select: none;
    }*/

    @keyframes floatHeart {
      0%   { opacity: 1; transform: translateY(0) scale(1) rotate(var(--rot)); }
      80%  { opacity: 0.6; }
      100% { opacity: 0; transform: translateY(-220px) scale(0.4) rotate(calc(var(--rot) + 20deg)); }
    }
  </style>
</head>
<body>

<canvas id="confetti-canvas"></canvas>

<div class="wrapper">

  <nav id="nav">
    <button class="nav-btn" data-section="foreplay">Foreplay</button>
    <button class="nav-btn active" data-section="positions">Positions</button>
    <button class="nav-btn" data-section="guided">Guided</button>
    <button class="nav-btn" data-section="solo">Solo Mode</button>
  </nav>

  <div class="label-row">
    <div class="section-label" id="section-label"></div>
    <button class="info-btn" id="infoBtn" aria-label="Fruit info">?</button>
    <div class="info-popup" id="infoPopup"></div>
  </div>

  <div class="press-area">
    <button class="press-btn" id="pressBtn">PRESS</button>
  </div>

</div>

<script>
  const FRUIT_INFO = {
    'Missionary':  'One partner lies on their back, the other on top, facing them.',
    'Cowgirl':   'The bottom partner lies down while the other sits or kneels on top.',
    'Side-by-side': 'Both partners lie facing each other on their sides.',
    'Lotus': 'One partner sits cross-legged while the other sits facing them, legs wrapped around.',
    'Chair':  'One partner sits on a chair, the other sits on their lap facing them.',
    'Standing embrace':  'Both partners stand facing each other.',
    'Supported standing':   'One partner is lifted or supported against a wall.',
    'Bridge position':  'One partner is on hands and knees, the other kneels behind.',
    'Doggy style':  'One partner is on hands and knees, the other kneels behind.',
    'Wheelbarrow':  'One partner supports themselves with hands while the other holds their legs.',
    'Legs elevated':  'One partner lies back with legs raised',
    'Spooning':  'Both lie on their sides facing the same direction',
    'Face-to-face seated':  'Both sit upright facing each other, allowing eye contact',
    'Edge of the bed':  'One partner lies near the edge while the other stands or kneels.',
    'Reverse cowgirl':  'Similar to cowgirl but facing away.',
    'Lap dance position':  'One partner sits while the other straddles them facing away or toward them.',
    'Tabletop':  'One partner sits or lies on a sturdy surface while the other stands.',
    'Scissors':  'Both partners lie intersecting at an angle.',
    'Flatiron':  'One partner lies flat on their stomach while the other aligns closely on top.',
    'Mirror position':  'Facing a mirror adds a visual element and changes perspective.',
  };

  const infoBtn   = document.getElementById('infoBtn');
  const infoPopup = document.getElementById('infoPopup');
  let currentFruit = '';
  let popupOpen = false;

  function updateInfoBtn() {
    const shouldShow = active === 'positions' && currentFruit !== '';
    infoBtn.classList.toggle('visible', shouldShow);
    if (!shouldShow) hidePopup();
  }

  function hidePopup() {
    infoPopup.classList.remove('show');
    popupOpen = false;
  }

  infoBtn.addEventListener('click', (e) => {
    e.stopPropagation();
    if (popupOpen) {
      hidePopup();
    } else {
      infoPopup.textContent = FRUIT_INFO[currentFruit] || '';
      infoPopup.classList.add('show');
      popupOpen = true;
    }
  });

  document.addEventListener('click', () => hidePopup());
  const sections = {
    foreplay:  { label: 'Foreplay',   color: '#e75480' },
    positions: { label: 'Positions',  color: '#c0392b' },
    guided:    { label: 'Guided',     color: '#5dade2' },
    solo:      { label: 'Solo Mode',  color: '#f4d03f' },
  };

  let active = 'positions';

  const navBtns    = document.querySelectorAll('.nav-btn');
  const pressBtn   = document.getElementById('pressBtn');
  const sectionLbl = document.getElementById('section-label');

  function setActive(key) {
    active = key;
    const { color } = sections[key];
    navBtns.forEach(b => b.classList.toggle('active', b.dataset.section === key));
    document.documentElement.style.setProperty('--active-color', color);
    sectionLbl.textContent = '';
    currentFruit = '';
    updateInfoBtn();
  }

  navBtns.forEach(btn => {
    btn.addEventListener('click', () => setActive(btn.dataset.section));
  });

  /* ── CONFETTI ── */
  const canvas = document.getElementById('confetti-canvas');
  const ctx    = canvas.getContext('2d');
  let particles = [];
  let animId    = null;

  function resizeCanvas() {
    canvas.width  = window.innerWidth;
    canvas.height = window.innerHeight;
  }
  resizeCanvas();
  window.addEventListener('resize', resizeCanvas);

  const COLORS = ['#ff6b9d','#ff4757','#ff6348','#ffa502','#7bed9f','#70a1ff','#eccc68','#ff4500','#e84393'];
  /*const HEARTS = ['❤️','🩷','💜','🤍','💕','💖','💗','💓'];*/

  function spawnParticles(cx, cy) {
    const count = 120;
    for (let i = 0; i < count; i++) {
      const angle  = Math.random() * Math.PI * 2;
      const speed  = 4 + Math.random() * 10;
      const size   = 6 + Math.random() * 8;
      const shape  = Math.random() < 0.5 ? 'rect' : 'circle';
      particles.push({
        x: cx, y: cy,
        vx: Math.cos(angle) * speed,
        vy: Math.sin(angle) * speed - (Math.random() * 4),
        size,
        color: COLORS[Math.floor(Math.random() * COLORS.length)],
        shape,
        rotation: Math.random() * 360,
        rotSpeed: (Math.random() - 0.5) * 8,
        life: 1,
        decay: 0.012 + Math.random() * 0.01,
      });
    }
  }

  /*function spawnHearts(cx, cy) {
    for (let i = 0; i < 18; i++) {
      const el = document.createElement('span');
      el.className = 'heart-particle';
      el.textContent = HEARTS[Math.floor(Math.random() * HEARTS.length)];
      const spread = 180;
      const x = cx - spread/2 + Math.random() * spread;
      const y = cy - 40 + Math.random() * 60;
      const rot = -20 + Math.random() * 40;
      const size = 1.2 + Math.random() * 1.4;
      el.style.left = x + 'px';
      el.style.top  = y + 'px';
      el.style.fontSize = size + 'rem';
      el.style.setProperty('--rot', rot + 'deg');
      el.style.animationDelay = (Math.random() * 0.3) + 's';
      document.body.appendChild(el);
      setTimeout(() => el.remove(), 2200);
    }
  }*/

  function animateConfetti() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    particles.forEach(p => {
      ctx.save();
      ctx.globalAlpha = p.life;
      ctx.fillStyle   = p.color;
      ctx.translate(p.x, p.y);
      ctx.rotate(p.rotation * Math.PI / 180);
      if (p.shape === 'rect') {
        ctx.fillRect(-p.size/2, -p.size/4, p.size, p.size/2);
      } else {
        ctx.beginPath();
        ctx.arc(0, 0, p.size/2, 0, Math.PI*2);
        ctx.fill();
      }
      ctx.restore();

      p.x  += p.vx;
      p.y  += p.vy;
      p.vy += 0.35; // gravity
      p.vx *= 0.98;
      p.rotation += p.rotSpeed;
      p.life -= p.decay;
    });

    particles = particles.filter(p => p.life > 0);

    if (particles.length > 0) {
      animId = requestAnimationFrame(animateConfetti);
    } else {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      animId = null;
    }
  }

  const FRUITS = {
    positions: [ {name:'Missionary', w:15}, {name:'Cowgirl', w:5}, {name:'Side-by-side', w:5}, {name:'Lotus', w:5}, {name:'Standing embrace', w:5}, {name:'Chair', w:5}, {name:'Supported standing', w:5}, {name:'Doggy style', w:5}, {name:'Bridge position', w:5}, {name:'Wheelbarrow', w:5}, {name:'Legs elevated', w:5}, {name:'Spooning', w:5}, {name:'Face-to-face seated', w:5}, {name:'Edge of the bed', w:5}, {name:'Reverse cowgirl', w:5}, {name:'Lap dance position', w:5}, {name:'Tabletop', w:5}, {name:'Scissors', w:5}, {name:'Flatiron', w:5}, {name:'Mirror position', w:5}],
    foreplay:  [ {name:'Sensual kissing', w:10}, {name:'Neck kisses', w:10}, {name:'Gentle exploration and teasing touches', w:10}, {name:'Pull your partner close and hold firmly', w:10}, {name:'Hold eye contact', w:10}, {name:'Touch your partners cheek and make eye contact', w:10}, {name:'Touch your partners butt', w:10}, {name:'Grab your partners tighs', w:10}, {name:'Make inappropriate touches', w:10}, {name:'Gently tickle your partner', w:10} ],
    guided:    [ {name:'I guide you to try new Positions', w:40}, {name:'When was the last time you Teased your partner?', w:20}, {name:'Explore new Positions and open new horizons in your sex life', w:20}, {name:'Teasing is not a crime', w:20}],
    solo:      [ {name:'Nice try! Find a partner first', w:25}, {name:'I cannot handle you', w:25}, {name:'How would you like to do it? xd', w:25}, {name:'Make yourself comfortable...', w:25}],
  };

  function weightedRandom(pool) {
    const total = pool.reduce((sum, f) => sum + f.w, 0);
    let r = Math.random() * total;
    for (const f of pool) { r -= f.w; if (r <= 0) return f.name; }
    return pool[pool.length - 1].name;
  }

  pressBtn.addEventListener('click', () => {
    // random fruit label
    sectionLbl.classList.remove('flash');
    void sectionLbl.offsetWidth;
    const pool = FRUITS[active];
    const picked = weightedRandom(pool);
    currentFruit = picked;
    sectionLbl.textContent = picked;
    updateInfoBtn();
    hidePopup();
    sectionLbl.classList.add('flash');

    // pop animation
    pressBtn.classList.remove('pop');
    void pressBtn.offsetWidth;
    pressBtn.classList.add('pop');
    pressBtn.addEventListener('animationend', () => pressBtn.classList.remove('pop'), { once: true });

    // origin: center of button
    const rect = pressBtn.getBoundingClientRect();
    const cx = rect.left + rect.width  / 2;
    const cy = rect.top  + rect.height / 2;

    // confetti
    if (animId) cancelAnimationFrame(animId);
    particles = [];
    spawnParticles(cx, cy);
    animateConfetti();

    // floating hearts
    spawnHearts(cx, cy);
  });

  /* init */
  sectionLbl.textContent = '';
  setActive('positions');
</script>
</body>
</html>
